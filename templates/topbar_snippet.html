<header class="topbar">
  <a class="topbar-logo" href="/dashboard">
    <img src="{{ url_for('static', filename='img/kpmg-vector-logo.png') }}" alt="KPMG"/>
  </a>

  <div class="topbar-search" id="topbar-search">
    <input
      class="topbar-search-input"
      id="search-input"
      type="text"
      placeholder="Search assessments..."
      autocomplete="off"
      oninput="handleSearch(this.value)"
      onblur="closeSearchDropdown()"
      onfocus="if(this.value.trim()) openSearchDropdown()"
    />
    <svg class="topbar-search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
      <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/>
      <path d="M9.5 9.5l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <div class="topbar-search-dropdown" id="search-dropdown"></div>
  </div>

  <nav class="topbar-nav">
    <a class="topbar-nav-link" href="/dashboard">Dashboard</a>
    <a class="topbar-nav-link" href="/create_assessment">New Assessment</a>
    <a class="topbar-nav-link" href="/history">History</a>
  </nav>

  <div class="topbar-right">
    <span class="topbar-user" id="topbar-user-name"></span>
    <div class="topbar-divider"></div>
    <button class="btn-logout" onclick="handleLogout()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M5 2H2a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M9 10l3-3-3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 7H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Logout
    </button>
  </div>
</header>
