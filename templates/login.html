<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — DG Toolkit</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}"/>
</head>
<body class="login-body">

  <div class="login-layout">

    <!-- Left branding panel -->
    <div class="login-brand">

      <!-- Logo pinned to top -->
      <img class="login-logo" src="{{ url_for('static', filename='img/kpmg-vector-logo.png') }}" alt="KPMG"/>

      <!-- Smaller spacer after logo -->
      <div style="flex:0.5"></div>

      <!-- Text centered vertically -->
      <div class="login-brand-inner">
        <div class="login-brand-divider"></div>
        <h1 class="login-brand-title">Data Governance<br>Maturity Assessment</h1>
        <p class="login-brand-sub">Internal toolkit for KPMG consultants. Assess, score, and deliver governance roadmaps.</p>
      </div>

      <!-- Larger spacer at bottom -->
      <div style="flex:0.8"></div>

    </div>

    <!-- Right login form -->
    <div class="login-form-panel">
      <div class="login-form-inner">

        <div class="login-form-eyebrow">KPMG Tunisia</div>
        <h2 class="login-form-title">Sign In</h2>
        <p class="login-form-sub">Enter your credentials to access the toolkit.</p>

        <div class="login-fields">
          <div class="login-field" id="f-email">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@kpmg.com" autocomplete="username"/>
            <span class="login-error-msg" id="email-error">Enter a valid email</span>
          </div>

          <div class="login-field" id="f-password">
            <label for="password">Password</label>
            <div class="login-password-wrap">
              <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
              <button class="login-eye" type="button" onclick="togglePassword()" id="eye-btn" aria-label="Show password">
                <svg id="eye-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M1 8C1 8 3.5 3 8 3s7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.3"/>
                  <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/>
                </svg>
              </button>
            </div>
            <span class="login-error-msg" id="password-error">Password is required</span>
          </div>
        </div>

        <div class="login-alert" id="login-alert" style="display:none;"></div>

        <button class="login-btn" id="login-btn" onclick="handleLogin()">
          <span id="login-btn-text">Sign In</span>
          <div class="login-btn-spinner" id="login-spinner" style="display:none;"></div>
        </button>

      </div>
    </div>

  </div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
